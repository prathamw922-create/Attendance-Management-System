<!DOCTYPE html>
<html>
<head>
<title>Attendance Pro</title>

<style>
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#294a8a,#2c6ac9);
font-family:Arial;
}

.container{
width:320px;
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#3f6df5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2f56c7;
}

</style>
</head>

<body>

<div class="container">

<h2>Attendance Pro</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>Default: admin / admin</p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="admin"){
alert("Login Successful");
window.location.href="dashboard.html";
}
else{
alert("Invalid Login");
}

}

</script>

</body>
</html>
